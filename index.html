<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Slicer Pro - Ultimate Edition</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --accent: #007AFF; --bg: #050505; --panel: #111; --border: #222; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .main { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; }
        .sidebar { width: 300px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px; z-index: 10; overflow-y: auto; }
        
        .stage { flex: 1; display: flex; justify-content: center; align-items: center; cursor: crosshair; }
        #hint { position: absolute; color: #666; font-size: 14px; letter-spacing: 2px; pointer-events: none; text-align: center; line-height: 1.6; }

        .group { margin-bottom: 22px; }
        .label-text { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; display: block; margin-bottom: 10px; }
        
        input[type="text"], select { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; font-size: 13px; }
        input[type="text"]:focus { border-color: var(--accent); }
        
        .mode-switch { display: flex; background: #0a0a0a; padding: 4px; border-radius: 8px; border: 1px solid #222; }
        .mode-switch button { flex: 1; border: none; background: none; color: #666; padding: 8px; font-size: 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .mode-switch button.active { background: #222; color: #fff; font-weight: bold; }

        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 13px; background: #222; color: #ccc; transition: 0.2s; text-align: center; display: flex; justify-content: center; align-items: center; }
        .btn:hover { background: #333; color: #fff; }
        .btn.active { background: #fff !important; color: #000 !important; font-weight: bold; }
        .btn.primary { background: var(--accent); color: white; width: 100%; height: 50px; font-weight: 600; margin-top: auto; border-radius: 10px; }

        .footer-bar { height: 70px; border-top: 1px solid var(--border); display: flex; justify-content: center; align-items: center; gap: 16px; background: #0a0a0a; padding-bottom: env(safe-area-inset-bottom); }
        #file-ipt { display: none; }

        .config-card { background: #1a1a1a; padding: 16px; border-radius: 10px; border: 1px solid #2a2a2a; margin-bottom: 20px; }
        .switch-row { display: flex; align-items: center; justify-content: space-between; cursor: pointer; margin-bottom: 16px; }
        .switch-row:last-child { margin-bottom: 0; }
        .switch-row span { font-size: 13px; color: #ddd; user-select: none; }
        .switch-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); margin: 0; pointer-events: auto; }
        
        input[type="range"] { width: 100%; height: 4px; background: #333; border-radius: 2px; appearance: none; margin-top: 8px; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: #fff; border-radius: 50%; border: 2px solid var(--accent); }
    </style>
</head>
<body>

<div class="main">
    <div class="stage" onclick="if(!img)document.getElementById('file-ipt').click()">
        <div id="hint">点击上传图片</div>
        <canvas id="c"></canvas>
    </div>
    <div class="footer-bar">
        <button class="btn" onclick="setGrid(3,3)">3 × 3 九宫格</button>
        <button class="btn" onclick="setGrid(1,3)">1 × 3 三连排</button>
        <button class="btn" style="color: #666;" onclick="location.reload()">清空</button>
    </div>
</div>

<div class="sidebar">
    <div style="font-size: 16px; font-weight: 900; margin-bottom: 30px; color: #fff; letter-spacing: 1px;">SLICER <span style="color:var(--accent)">PRO</span></div>
    
    <div class="group">
        <button class="btn" style="width:100%; background: #1a1a1a; border: 1px solid #333; height: 46px;" onclick="addWM()">＋ 添加水印</button>
    </div>

    <div id="wm-panel" style="display:none">
        <div class="config-card">
            <span class="label-text">功能约束</span>
            <label class="switch-row">
                <span>强制物理比例锁定</span>
                <input type="checkbox" id="ratio-lock" onchange="enforceRatioLock()">
            </label>
            <label class="switch-row">
                <span>右下角预设死锁</span>
                <input type="checkbox" id="last-lock" onchange="toggleLock(this.checked)">
            </label>
        </div>

        <div class="group">
            <span class="label-text">滤镜渲染</span>
            <div class="mode-switch">
                <button id="m-diff" class="active" onclick="setWMStyle('diff')">无损反色</button>
                <button id="m-solid" onclick="setWMStyle('solid')">常规纯色</button>
            </div>
        </div>

        <div class="group">
            <span class="label-text">文字设定</span>
            <input type="text" id="wm-text" value="WATERMARK" oninput="updateWM('text', this.value)" style="margin-bottom: 10px;">
            <div style="display:flex; gap:8px;">
                <select id="wm-font" onchange="updateWM('fontFamily', this.value)" style="flex:1">
                    <option value="Helvetica">Helvetica</option>
                    <option value="PingFang SC">苹方 (iOS)</option>
                    <option value="Georgia">Georgia</option>
                </select>
                <button id="bold-btn" class="btn active" style="width:46px; background:#1a1a1a;" onclick="toggleBold()">B</button>
            </div>
            <div id="solid-controls" style="display:none; margin-top:15px;">
                <span class="label-text" style="margin-bottom: 5px;">不透明度</span>
                <input type="range" id="wm-opacity" min="0" max="1" step="0.01" value="0.8" oninput="updateWM('opacity', parseFloat(this.value))">
            </div>
        </div>
    </div>

    <button id="save-btn" class="btn primary" style="display:none;" onclick="exportZip()">保存超清图包</button>
</div>

<input type="file" id="file-ipt" accept="image/*">

<script>
    let canvas, img, cropBox, wm;
    let rows = 3, cols = 3;

    window.onload = () => {
        const stage = document.querySelector('.stage');
        canvas = new fabric.Canvas('c', { width: stage.clientWidth, height: stage.clientHeight, selection: false });

        canvas.on('object:moving', handleConstraint);
        canvas.on('object:scaling', (e) => {
            // 前置比例硬锁计算，确保拖拽拉手时按照目标比例缩放
            if (e.target === cropBox && document.getElementById('ratio-lock').checked) {
                const targetRatio = cols / rows; 
                e.target.scaleY = (e.target.width * e.target.scaleX / targetRatio) / e.target.height;
            }
            handleConstraint(e);
        });
        canvas.on('after:render', updateLockPosition);
    };

    // 统一物理边界重构
    function handleConstraint(e) {
        const obj = e.target;
        if (!img || !obj) return;

        const imgCenter = img.getCenterPoint();
        const iw = img.getScaledWidth();
        const ih = img.getScaledHeight();
        const imgLeft = imgCenter.x - iw/2;
        const imgTop = imgCenter.y - ih/2;

        if (obj === cropBox) {
            let cw = obj.getScaledWidth();
            let ch = obj.getScaledHeight();
            
            // 修复：正方形限制在触边时的缩放溢出
            if (document.getElementById('ratio-lock').checked) {
                if (cw > iw || ch > ih) {
                    const scaleToFit = Math.min(iw / cw, ih / ch);
                    cw *= scaleToFit;
                    ch *= scaleToFit;
                    obj.scaleX = cw / obj.width;
                    obj.scaleY = ch / obj.height;
                }
            } else {
                if (cw > iw) { obj.scaleX = iw / obj.width; cw = iw; }
                if (ch > ih) { obj.scaleY = ih / obj.height; ch = ih; }
            }
            
            const center = obj.getCenterPoint();
            let objLeft = center.x - cw/2;
            let objTop = center.y - ch/2;
            
            if (objLeft < imgLeft) objLeft = imgLeft;
            if (objTop < imgTop) objTop = imgTop;
            if (objLeft + cw > imgLeft + iw) objLeft = imgLeft + iw - cw;
            if (objTop + ch > imgTop + ih) objTop = imgTop + ih - ch;
            
            obj.setPositionByOrigin(new fabric.Point(objLeft + cw/2, objTop + ch/2), 'center', 'center');
        } 
        else if (obj === wm && !document.getElementById('last-lock').checked && cropBox) {
            // 重构：水印应用和裁切框完全相同的数学防越界逻辑
            const cw = cropBox.getScaledWidth();
            const ch = cropBox.getScaledHeight();
            const cbCenter = cropBox.getCenterPoint();
            const cbLeft = cbCenter.x - cw/2;
            const cbTop = cbCenter.y - ch/2;
            
            let wmw = wm.getScaledWidth();
            let wmh = wm.getScaledHeight();
            const wCenter = wm.getCenterPoint();

            // 极限大小拦截 (防止文字比框还大)
            if (wmw > cw) { wm.scaleX = cw / wm.width; wmw = cw; }
            if (wmh > ch) { wm.scaleY = ch / wm.height; wmh = ch; }
            
            let wmLeft = wCenter.x - wmw/2;
            let wmTop = wCenter.y - wmh/2;
            
            if (wmLeft < cbLeft) wmLeft = cbLeft;
            if (wmTop < cbTop) wmTop = cbTop;
            if (wmLeft + wmw > cbLeft + cw) wmLeft = cbLeft + cw - wmw;
            if (wmTop + wmh > cbTop + ch) wmTop = cbTop + ch - wmh;
            
            wm.setPositionByOrigin(new fabric.Point(wmLeft + wmw/2, wmTop + wmh/2), 'center', 'center');
        }
    }

    function enforceRatioLock() {
        if (cropBox && document.getElementById('ratio-lock').checked) {
            const targetRatio = cols / rows;
            cropBox.scaleY = (cropBox.width * cropBox.scaleX / targetRatio) / cropBox.height;
            handleConstraint({ target: cropBox });
            canvas.requestRenderAll();
        }
    }

    function updateLockPosition() {
        if (wm && cropBox && document.getElementById('last-lock').checked) {
            const cw = cropBox.getScaledWidth();
            const ch = cropBox.getScaledHeight();
            const center = cropBox.getCenterPoint();
            const mathLeft = center.x - cw / 2;
            const mathTop = center.y - ch / 2;
            
            const cellW = cw / cols;
            const cellH = ch / rows;
            
            wm.set({
                fontSize: cellW * 0.14,
                left: mathLeft + cw - (cellW * 0.05),
                top: mathTop + ch - (cellH * 0.05),
                originX: 'right', originY: 'bottom',
                angle: 0, scaleX: 1, scaleY: 1
            });
            wm.setCoords();
        }
    }

    function toggleLock(on) {
        if (!wm) return;
        wm.set({ selectable: !on, evented: !on, hasControls: !on });
        if (on) {
            updateLockPosition();
        } else {
            // 解锁时归中坐标系，防止突兀偏移
            const center = wm.getCenterPoint();
            wm.set({ originX: 'center', originY: 'center' });
            wm.setPositionByOrigin(center, 'center', 'center');
        }
        canvas.requestRenderAll();
    }

    document.getElementById('file-ipt').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (o) => {
                canvas.clear();
                img = o;
                const s = Math.min(canvas.width / o.width, canvas.height / o.height) * 0.82;
                o.set({ scaleX: s, scaleY: s, left: canvas.width/2, top: canvas.height/2, originX: 'center', originY: 'center', selectable: false, evented: false });
                canvas.add(o);
                createBox();
                document.getElementById('save-btn').style.display = 'block';
                document.getElementById('hint').style.display = 'none';
                canvas.renderAll();
            });
        };
        reader.readAsDataURL(file);
    };

    function createBox() {
        if (cropBox) canvas.remove(cropBox);
        const size = Math.min(canvas.width, canvas.height) * 0.5;
        // 动态初始比例计算
        const targetRatio = cols / rows;
        const h = size / targetRatio; 
        
        const rect = new fabric.Rect({ left: 0, top: 0, width: size, height: h, fill: 'transparent', stroke: '#fff', strokeWidth: 1.5, strokeUniform: true });
        const lines = [];
        for (let i = 1; i < cols; i++) lines.push(new fabric.Line([i*(size/cols), 0, i*(size/cols), h], { stroke: '#fff', strokeWidth: 1, opacity: 0.4, selectable: false }));
        for (let i = 1; i < rows; i++) lines.push(new fabric.Line([0, i*(h/rows), size, i*(h/rows)], { stroke: '#fff', strokeWidth: 1, opacity: 0.4, selectable: false }));
        
        cropBox = new fabric.Group([rect, ...lines], {
            left: canvas.width / 2, top: canvas.height / 2,
            originX: 'center', originY: 'center',
            cornerColor: '#fff', cornerStrokeColor: '#000', cornerSize: 12,
            transparentCorners: false, hasRotatingPoint: false,
            globalCompositeOperation: 'difference'
        });
        canvas.add(cropBox);
        canvas.setActiveObject(cropBox);
        
        // 如果创建时开启了比例死锁，强制执行一次刷新
        enforceRatioLock();
    }

    function addWM() {
        if (wm) canvas.remove(wm);
        wm = new fabric.IText(document.getElementById('wm-text').value, {
            left: canvas.width/2, top: canvas.height/2,
            fontSize: 22, fill: '#fff', fontFamily: 'Helvetica', fontWeight: 'bold',
            cornerSize: 10, cornerColor: '#fff', transparentCorners: false,
            originX: 'center', originY: 'center',
            globalCompositeOperation: 'difference'
        });
        canvas.add(wm);
        canvas.setActiveObject(wm);
        document.getElementById('wm-panel').style.display = 'block';
        if (document.getElementById('last-lock').checked) updateLockPosition();
        canvas.requestRenderAll();
    }

    function setWMStyle(mode) {
        if(!wm) return;
        const isDiff = mode === 'diff';
        wm.set({ globalCompositeOperation: isDiff ? 'difference' : 'source-over', opacity: isDiff ? 1 : parseFloat(document.getElementById('wm-opacity').value) });
        document.getElementById('m-diff').className = isDiff ? 'active' : '';
        document.getElementById('m-solid').className = !isDiff ? 'active' : '';
        document.getElementById('solid-controls').style.display = isDiff ? 'none' : 'block';
        canvas.requestRenderAll();
    }

    function toggleBold() {
        if (!wm) return;
        const isB = wm.fontWeight === 'bold';
        wm.set('fontWeight', isB ? 'normal' : 'bold');
        document.getElementById('bold-btn').classList.toggle('active', !isB);
        canvas.requestRenderAll();
    }

    function updateWM(p, v) { if(wm) { wm.set(p, v); canvas.requestRenderAll(); } }
    
    function setGrid(r, c) { 
        rows = r; cols = c; 
        if(img) createBox(); 
    }

    async function exportZip() {
        const btn = document.getElementById('save-btn');
        btn.innerText = "切片渲染中..."; btn.disabled = true;
        const zip = new JSZip();
        
        const ratio = img._element.naturalWidth / img.getScaledWidth();

        const mainExport = document.createElement('canvas');
        const mctx = mainExport.getContext('2d');
        mainExport.width = img._element.naturalWidth;
        mainExport.height = img._element.naturalHeight;
        mctx.drawImage(img._element, 0, 0);

        const imgCenter = img.getCenterPoint();
        const imgMathLeft = imgCenter.x - img.getScaledWidth() / 2;
        const imgMathTop = imgCenter.y - img.getScaledHeight() / 2;

        if (wm) {
            const wr = wm.getBoundingRect();
            mctx.save();
            mctx.globalAlpha = wm.opacity;
            if (wm.globalCompositeOperation === 'difference') {
                mctx.globalCompositeOperation = 'difference';
                mctx.fillStyle = '#ffffff';
            } else {
                mctx.fillStyle = wm.fill;
            }
            const finalFs = wm.fontSize * ratio * wm.scaleX;
            mctx.font = `${wm.fontWeight} ${finalFs}px "${wm.fontFamily}"`;
            
            const wmLeft = (wr.left - imgMathLeft) * ratio;
            const wmTop = (wr.top - imgMathTop) * ratio;
            
            if (wm.originX === 'right') { 
                mctx.textAlign = 'right'; 
                mctx.fillText(wm.text, wmLeft + wr.width * ratio, wmTop + finalFs * 0.85); 
            } else { 
                mctx.textAlign = 'left'; 
                mctx.fillText(wm.text, wmLeft, wmTop + finalFs * 0.85); 
            }
            mctx.restore();
        }

        const cw = cropBox.getScaledWidth();
        const ch = cropBox.getScaledHeight();
        const center = cropBox.getCenterPoint();
        const cbLeft = center.x - cw / 2;
        const cbTop = center.y - ch / 2;

        const sw = (cw * ratio) / cols;
        const sh = (ch * ratio) / rows;
        const sx = (cbLeft - imgMathLeft) * ratio;
        const sy = (cbTop - imgMathTop) * ratio;

        const slice = document.createElement('canvas');
        const sctx = slice.getContext('2d');
        slice.width = sw; slice.height = sh;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                sctx.clearRect(0, 0, sw, sh);
                sctx.drawImage(mainExport, sx + c*sw, sy + r*sh, sw, sh, 0, 0, sw, sh);
                const b = await new Promise(res => slice.toBlob(res, 'image/jpeg', 0.95));
                zip.file(`slicer_${r+1}_${c+1}.jpg`, b);
            }
        }
        const b = await zip.generateAsync({type: "blob"});
        saveAs(b, "SlicerPro_HD.zip");
        btn.innerText = "保存超清图包"; btn.disabled = false;
    }
</script>
</body>
</html>
